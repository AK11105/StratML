mode: beginner
dataset:
  path: data/digits_noisy.csv
  target_column: target
execution:
  max_iterations: 5
  timeout_per_run: 300
  random_seed: 42
split:
  method: stratified
  test_size: 0.2
logging:
  enable_mlflow: false
  enable_tensorboard: false
  log_level: info
constraints:
  max_memory: null
  max_cpu: null
deep_learning:
  enabled: false
  architecture: MLP
  epochs: 20
  learning_rate: 0.001
  batch_size: 32
